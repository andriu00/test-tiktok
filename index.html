<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cargando Contenido...</title>
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            height: 100vh; margin: 0; background-color: #ffffff; color: #333; text-align: center; 
        }
        .loader { 
            border: 4px solid #f3f3f3; border-top: 4px solid #000; border-radius: 50%; 
            width: 40px; height: 40px; animation: spin 1s linear infinite; margin-bottom: 20px; 
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        .btn-action { 
            background-color: #000; color: #fff; padding: 16px 32px; border-radius: 50px; 
            text-decoration: none; font-weight: bold; font-size: 18px; display: none; 
            transition: transform 0.2s;
        }
        .btn-action:active { transform: scale(0.95); }
        
        #status-text { margin: 10px 20px; font-size: 1.1rem; font-weight: 500; }
        #sub-text { color: #666; font-size: 0.9rem; margin-top: 5px; }
    </style>
</head>
<body>

    <div id="visual-element" class="loader"></div>
    <h2 id="status-text">Verificando conexión segura...</h2>
    <p id="sub-text">Espera un momento, por favor.</p>

    <a href="#" id="main-button" class="btn-action">CONTINUAR AL BLOG</a>

    <script>
        // CONFIGURACIÓN: El dominio final sin https://
        const finalUrl = "landing-andriu.vercel.app"; 

        const ua = navigator.userAgent || navigator.vendor || window.opera;
        const isTikTok = ua.includes("TikTok");
        const isAndroid = /Android/i.test(ua);
        const isIOS = /iPhone|iPad|iPod/i.test(ua);

        const btn = document.getElementById('main-button');
        const loader = document.getElementById('visual-element');
        const statusText = document.getElementById('status-text');

        function performRedirect() {
            setTimeout(() => {
                if (isAndroid) {
                    window.location.href = "intent://" + finalUrl + "#Intent;scheme=https;action=android.intent.action.VIEW;end";
                } else if (isIOS) {
                    window.location.href = "https://" + finalUrl;
                } else {
                    window.location.href = "https://" + finalUrl;
                }
            }, 1500); 
        }

        if (isTikTok) {
            loader.style.display = "none";
            btn.style.display = "inline-block";
            statusText.innerText = "Listo para continuar";
            
            btn.onclick = function(e) {
                e.preventDefault();
                btn.innerText = "Abriendo...";
                btn.style.opacity = "0.7";
                performRedirect();
            };
        } else {
            performRedirect();
        }
    </script>
</body>
</html>
